<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pomodoro</title>

<!-- Poppins font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #f6f6f6;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    text-align: center;
  }

  .circle {
    width: 260px;
    height: 260px;
    border-radius: 50%;
    background: conic-gradient(#FFD84D 0deg, #e6e6e6 0deg);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 30px;
    position: relative;
  }

  .inner {
    width: 220px;
    height: 220px;
    background: white;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .time {
    font-size: 42px;
    font-weight: 500;
  }

  .session {
    color: #777;
    font-size: 14px;
  }

  .pause-icon {
    position: absolute;
    font-size: 50px;
    color: #FFD84D;
    display: none;
  }

  .paused .pause-icon {
    display: block;
  }

  .paused .time,
  .paused .session {
    opacity: 0.2;
  }

  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 20px;
  }

  button {
    padding: 8px 16px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #FFD84D;
    font-family: 'Poppins', sans-serif;
  }

  .settings {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 260px;
  }

  .row {
    display: flex;
    justify-content: space-between;
    background: white;
    padding: 12px;
    border-radius: 10px;
  }

  input {
    width: 50px;
    border: none;
    background: #f0f0f0;
    border-radius: 6px;
    text-align: center;
    font-family: 'Poppins', sans-serif;
  }
</style>
</head>
<body>

<div class="container">
  <div class="circle" id="circle">
    <div class="inner" id="inner">
      <div class="pause-icon">⏸</div>
      <div class="time" id="time">25:00</div>
      <div class="session" id="session">Focus</div>
    </div>
  </div>

  <div class="controls">
    <button onclick="start()">Start</button>
    <button onclick="pause()">Pause</button>
    <button onclick="reset()">Reset</button>
  </div>

  <div class="settings">
    <div class="row">
      <span>Focus</span>
      <input id="focusInput" type="number" value="25">
    </div>
    <div class="row">
      <span>Break</span>
      <input id="breakInput" type="number" value="5">
    </div>
  </div>
</div>

<script>
let focusTime = 25 * 60;
let breakTime = 5 * 60;
let timeLeft;
let isRunning = false;
let isFocus = true;
let startTime = null;

const radius = 100;
const circumference = 2 * Math.PI * radius;
const progress = document.getElementById("progress");

// 🔹 загрузка из localStorage
function loadSettings() {
  const savedFocus = localStorage.getItem("focusTime");
  const savedBreak = localStorage.getItem("breakTime");

  if (savedFocus) {
    focusTime = savedFocus;
    document.getElementById("focusInput").value = focusTime / 60;
  }

  if (savedBreak) {
    breakTime = savedBreak;
    document.getElementById("breakInput").value = breakTime / 60;
  }
}

// 🔹 сохранение
function saveSettings() {
  localStorage.setItem("focusTime", focusTime);
  localStorage.setItem("breakTime", breakTime);
}

function updateDisplay() {
  const minutes = Math.floor(timeLeft / 60);
  const seconds = Math.floor(timeLeft % 60);

  document.getElementById("time").textContent =
    `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;

  document.getElementById("session").textContent =
    isFocus ? "FOCUS" : "BREAK";
}

function animate(timestamp) {
  if (!isRunning) return;

  if (!startTime) startTime = timestamp;

  const delta = (timestamp - startTime) / 1000;
  startTime = timestamp;

  timeLeft -= delta;

  if (timeLeft <= 0) {
    isFocus = !isFocus;
    timeLeft = isFocus ? focusTime : breakTime;
  }

  updateProgress();
  updateDisplay();

  requestAnimationFrame(animate);
}

function updateProgress() {
  const total = isFocus ? focusTime : breakTime;
  const percent = timeLeft / total;

  const offset = circumference * percent;
  progress.style.strokeDashoffset = offset;

  progress.style.stroke = isFocus ? "#FFD84D" : "#214FAA";
}

function toggle() {
  isRunning = !isRunning;

  document.getElementById("playPause").textContent =
    isRunning ? "⏸" : "▶";

  if (isRunning) {
    startTime = null;
    requestAnimationFrame(animate);
  }
}

function reset() {
  isRunning = false;
  document.getElementById("playPause").textContent = "▶";

  focusTime = document.getElementById("focusInput").value * 60;
  breakTime = document.getElementById("breakInput").value * 60;

  // 🔹 сохраняем
  saveSettings();

  isFocus = true;
  timeLeft = focusTime;

  updateDisplay();
  updateProgress();
}

// 🔹 инициализация
loadSettings();
timeLeft = focusTime;

updateDisplay();
updateProgress();
</script>


</body>
</html>
