<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pomodoro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  html, body {
    margin: 0;
    height: 100%;
    background: transparent;
    font-family: 'Poppins', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .card {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.4);
    border-radius: 20px;
    padding: 25px;
    width: 300px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.1);
    border: 1px solid rgba(255,255,255,0.6);
    text-align: center;
  }

  .circle {
    width: 240px;
    height: 240px;
    position: relative;
    margin: 0 auto 20px;
  }

  svg {
    transform: rotate(-90deg);
  }

  .bg {
    stroke: #e6e6e6;
  }

  .progress {
    stroke: #FFD84D;
    stroke-linecap: round;
    transition: stroke 0.3s;
  }

  .inner {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 180px;
    height: 180px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .time {
    font-size: 36px;
    font-weight: 500;
  }

  .session {
    font-size: 13px;
    color: #555;
    letter-spacing: 1px;
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 15px 0;
  }

  .icon-btn {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
    cursor: pointer;
    font-size: 18px;
  }

  .settings {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 10px;
  }

  .row {
    display: flex;
    justify-content: space-between;
    background: rgba(255,255,255,0.5);
    padding: 10px;
    border-radius: 10px;
  }

  input {
    width: 50px;
    border: none;
    background: rgba(255,255,255,0.7);
    border-radius: 6px;
    text-align: center;
    font-family: 'Poppins';
  }
</style>
</head>
<body>

<div class="card">
  <div class="circle">
    <svg width="240" height="240">
      <circle class="bg" cx="120" cy="120" r="100" stroke-width="10" fill="none"/>
      <circle class="progress" id="progress" cx="120" cy="120" r="100" stroke-width="10" fill="none"
        stroke-dasharray="628"
        stroke-dashoffset="628"/>
    </svg>

    <div class="inner">
      <div class="time" id="time">25:00</div>
      <div class="session" id="session">FOCUS</div>
    </div>
  </div>

  <div class="controls">
    <button class="icon-btn" onclick="toggle()" id="playPause">▶</button>
    <button class="icon-btn" onclick="reset()">⟲</button>
  </div>

  <div class="settings">
    <div class="row">
      <span>Focus</span>
      <input id="focusInput" type="number" value="25">
    </div>
    <div class="row">
      <span>Break</span>
      <input id="breakInput" type="number" value="5">
    </div>
  </div>
</div>

<script>
let focusTime = 25 * 60;
let breakTime = 5 * 60;
let timeLeft;

let isRunning = false;
let isFocus = true;
let startTime = null;

const radius = 100;
const circumference = 2 * Math.PI * radius;

const progress = document.getElementById("progress");

// ✅ загрузка настроек
function loadSettings() {
  const savedFocus = localStorage.getItem("focusTime");
  const savedBreak = localStorage.getItem("breakTime");

  if (savedFocus) {
    focusTime = parseInt(savedFocus);
    document.getElementById("focusInput").value = focusTime / 60;
  }

  if (savedBreak) {
    breakTime = parseInt(savedBreak);
    document.getElementById("breakInput").value = breakTime / 60;
  }
}

// ✅ сохранение
function saveSettings() {
  localStorage.setItem("focusTime", focusTime);
  localStorage.setItem("breakTime", breakTime);
}

function updateDisplay() {
  const minutes = Math.floor(timeLeft / 60);
  const seconds = Math.floor(timeLeft % 60);

  document.getElementById("time").textContent =
    `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;

  document.getElementById("session").textContent =
    isFocus ? "FOCUS" : "BREAK";
}

function animate(timestamp) {
  if (!isRunning) return;

  if (!startTime) startTime = timestamp;

  const delta = (timestamp - startTime) / 1000;
  startTime = timestamp;

  timeLeft -= delta;

  if (timeLeft <= 0) {
    isFocus = !isFocus;
    timeLeft = isFocus ? focusTime : breakTime;
  }

  updateProgress();
  updateDisplay();

  requestAnimationFrame(animate);
}

function updateProgress() {
  const total = isFocus ? focusTime : breakTime;
  const percent = timeLeft / total;

  const offset = circumference * percent;
  progress.style.strokeDashoffset = offset;

  progress.style.stroke = isFocus ? "#FFD84D" : "#214FAA";
}

function toggle() {
  isRunning = !isRunning;

  document.getElementById("playPause").textContent =
    isRunning ? "⏸" : "▶";

  if (isRunning) {
    startTime = null;
    requestAnimationFrame(animate);
  }
}

function reset() {
  isRunning = false;
  document.getElementById("playPause").textContent = "▶";

  focusTime = document.getElementById("focusInput").value * 60;
  breakTime = document.getElementById("breakInput").value * 60;

  saveSettings();

  isFocus = true;
  timeLeft = focusTime;

  updateDisplay();
  updateProgress();
}

// 🚀 запуск
loadSettings();
timeLeft = focusTime;

updateDisplay();
updateProgress();
</script>

</body>
</html>
