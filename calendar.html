<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Calendar Widget</title>
<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .calendar {
    background: #fff;
    border-radius: 16px;
    padding: 20px;
    width: 320px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
  }

  .header button {
    background: #f0f0f0;
    border: none;
    border-radius: 10px;
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-size: 16px;
  }

  .header h2 {
    margin: 0;
    font-size: 18px;
  }

  .days, .dates {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
  }

  .days div {
    color: #888;
    font-size: 13px;
    margin-bottom: 10px;
  }

  .dates div {
    padding: 10px 0;
    margin: 2px;
    border-radius: 10px;
    cursor: default;
  }

  .today {
    background: black;
    color: white;
  }

  .other-month {
    color: #ccc;
  }
</style>
</head>
<body>

<div class="calendar">
  <div class="header">
    <button onclick="changeMonth(-1)">‹</button>
    <h2 id="monthYear"></h2>
    <button onclick="changeMonth(1)">›</button>
  </div>

  <div class="days">
    <div>Mo</div><div>Tu</div><div>We</div>
    <div>Th</div><div>Fr</div><div>Sa</div><div>Su</div>
  </div>

  <div class="dates" id="dates"></div>
</div>

<script>
  const monthYear = document.getElementById("monthYear");
  const dates = document.getElementById("dates");

  let currentDate = new Date();

  function renderCalendar() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();

    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);

    // сдвиг под ПН (0=вс → 6, 1=пн → 0)
    let startDay = (firstDay.getDay() + 6) % 7;

    monthYear.textContent = currentDate.toLocaleString("en-US", {
      month: "long",
      year: "numeric"
    });

    dates.innerHTML = "";

    // предыдущий месяц
    const prevLastDay = new Date(year, month, 0).getDate();
    for (let i = startDay; i > 0; i--) {
      let div = document.createElement("div");
      div.textContent = prevLastDay - i + 1;
      div.classList.add("other-month");
      dates.appendChild(div);
    }

    // текущий месяц
    for (let i = 1; i <= lastDay.getDate(); i++) {
      let div = document.createElement("div");
      div.textContent = i;

      let today = new Date();
      if (
        i === today.getDate() &&
        month === today.getMonth() &&
        year === today.getFullYear()
      ) {
        div.classList.add("today");
      }

      dates.appendChild(div);
    }

    // следующий месяц
    let totalCells = dates.children.length;
    let nextDays = 42 - totalCells;

    for (let i = 1; i <= nextDays; i++) {
      let div = document.createElement("div");
      div.textContent = i;
      div.classList.add("other-month");
      dates.appendChild(div);
    }
  }

  function changeMonth(offset) {
    currentDate.setMonth(currentDate.getMonth() + offset);
    renderCalendar();
  }

  renderCalendar();
</script>

</body>
</html>
